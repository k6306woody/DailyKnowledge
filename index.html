// openModal = openPanel（保留舊名稱相容）
function openModal(id, day){ openPanel(id, day); }

function openPanel(id, day){
  const c = day ? CARDS.find(x=>x.id===id && x.day===day) : CARDS.find(x=>x.id===id);
  if(!c) return;
  const ct = cardText(c);
  const color = c.color||'#667eea';

  // Hero illustration
  const heroEl = document.getElementById('dp-illus');
  try{
    if(c.illus && c.illus.includes('<svg')){
      let svg = c.illus;
      svg = svg.replace(/(<svg[^>]*)(>)/,function(m,p1,p2){
        let s=p1;
        if(!/width=/.test(s)) s+=' width="100%"';
        else s=s.replace(/width="[^"]*"/,'width="100%"');
        if(!/height=/.test(s)) s+=' height="auto"';
        else s=s.replace(/height="[^"]*"/,'height="auto"');
        return s+p2;
      });
      heroEl.innerHTML=svg;
    } else {
      const emoji=(DOMAIN_META[c.domain]||{}).emoji||'🔬';
      heroEl.innerHTML=`<div style="height:160px;background:${color}22;display:flex;align-items:center;justify-content:center;font-size:60px">${emoji}</div>`;
    }
  }catch(e){ heroEl.innerHTML=`<div style="height:140px;background:${color}18"></div>`; }
  document.getElementById('dp-hero').style.background=color+'10';
  document.getElementById('dp-hero-bar').style.background=color;

  // Tag
  const dtag=document.getElementById('dp-dtag');
  dtag.textContent=ct.tag||'';
  dtag.style.color=color; dtag.style.background=color+'22';

  // Author / title / plain / tech / insight
  document.getElementById('dp-author').textContent=ct.author||c.author||'';
  document.getElementById('dp-title').textContent=ct.title||'';
  document.getElementById('dp-plain').textContent=ct.plain||'';
  document.getElementById('dp-tech').textContent=ct.tech||'';
  const ins=document.getElementById('dp-insight');
  ins.textContent=ct.insight||'';
  ins.style.borderLeftColor=color;
  ins.style.display=ct.insight?'':'none';

  // Paper link
  const lnk=document.getElementById('dp-link');
  if(c.url && c.url.startsWith('http')){
    lnk.href=c.url; lnk.style.background=color; lnk.style.display='flex';
    lnk.textContent='📄 '+(c.ref||'閱讀原文論文');
  } else { lnk.style.display='none'; }

  // Like button
  const hbtn=document.getElementById('dp-heart');
  const liked=isLiked(id);
  hbtn.className='dp-heart'+(liked?' liked':'');
  document.getElementById('dp-hcount').textContent=getLikes(id)||0;
  hbtn.onclick=()=>{ toggleLike(id); renderCards(); renderDrawer();
    document.getElementById('dp-hcount').textContent=getLikes(id)||0;
    hbtn.className='dp-heart'+(isLiked(id)?' liked':'');
  };

  // Open panel + shrink main
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('app').classList.add('panel-open');
}

function closePanel(){
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('app').classList.remove('panel-open');
}
function closeModal(){ closePanel(); }

function switchDTab(el,tab){
  curDTab=tab;
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderDrawer();
}

// ── Active filters state ─────────────────────────────────────────────────────
let activeFilters = { cat: null, day: null, author: null };

function applyActiveFilters(){
  // 重新渲染卡片（renderCards 已整合所有 activeFilters 條件）
  renderCards();
}

function resetFilters(){
  activeFilters = { cat: null, day: null, author: null };
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('hide'));
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.day===curDay));
  renderDrawer();
}

function renderDrawer(){
  const t = T[curLang] || T['zh-TW'];
  const el = document.getElementById('drawer-content');
  if(!el) return;

  // Update label text
  const titleEl = document.getElementById('drawer-title');
  if(titleEl) titleEl.textContent = t.drawerTitle||'篩選 / Filter';

  // Update tab labels for current lang
  const tabLabels = {
    cat:    {zh:'主題',en:'Topic',sc:'主题',ja:'テーマ',ko:'주제'},
    date:   {zh:'日期',en:'Date', sc:'日期',ja:'日付',ko:'날짜'},
    author: {zh:'作者',en:'Author',sc:'作者',ja:'著者',ko:'저자'},
    likes:  {zh:'收藏',en:'Likes',sc:'收藏',ja:'いいね',ko:'좋아요'},
  };
  const lk = {zh:'zh-TW',en:'en',sc:'zh-CN',ja:'ja',ko:'ko'}; // reverse lookup not needed; use simple map
  const ll = curLang==='en'?'en':curLang==='zh-CN'?'sc':curLang==='ja'?'ja':curLang==='ko'?'ko':'zh';
  ['cat','date','author','likes'].forEach(tab=>{
    const span = document.querySelector(`#dtab-${tab} .dtab-label`);
    if(span) span.textContent = tabLabels[tab][ll]||tabLabels[tab].zh;
  });

  // Loading state
  if(!CARDS.length){
    el.innerHTML = `<div class="drawer-empty"><div class="de-icon">⏳</div>資料載入中…</div>`;
    return;
  }

  const hasFilter = activeFilters.cat || activeFilters.day || activeFilters.author;
  const resetBtn = hasFilter
    ? `<div class="filter-reset" onclick="resetFilters()">✕ 清除篩選</div>`
    : '';

  if(curDTab === 'cat'){
    // Group by domain, sorted by count
    const domainCounts = {};
    CARDS.forEach(c=>{ domainCounts[c.domain]=(domainCounts[c.domain]||0)+1; });
    const domains = Object.entries(domainCounts).sort((a,b)=>b[1]-a[1]);

    el.innerHTML = resetBtn + `<div class="drawer-section">
      <h4>🗂 依主題篩選</h4>
      <div class="filter-item${!activeFilters.cat?' on':''}" onclick="filterDrawerCat(null)">
        <div class="fi-left"><span class="fi-emoji">🌐</span><span class="fi-label">全部主題</span></div>
        <span class="fi-count">${CARDS.length}</span>
      </div>
      ${domains.map(([dom,cnt])=>{
        const m = DOMAIN_META[dom]||{emoji:'📌',label:{'zh-TW':dom}};
        const lbl = m.label[curLang]||m.label['zh-TW']||dom;
        const on = activeFilters.cat===dom;
        return`<div class="filter-item${on?' on':''}" onclick="filterDrawerCat('${dom}')">
          <div class="fi-left"><span class="fi-emoji">${m.emoji}</span><span class="fi-label">${lbl}</span></div>
          <span class="fi-count">${cnt}</span>
        </div>`;
      }).join('')}
    </div>`;

  } else if(curDTab === 'date'){
    el.innerHTML = '';
    renderCalendarInDrawer(el, resetBtn);
    return;

  } else if(curDTab === 'author'){
    const authorCounts = {};
    CARDS.forEach(c=>{ authorCounts[c.author]=(authorCounts[c.author]||0)+1; });
    const authors = Object.entries(authorCounts).sort((a,b)=>b[1]-a[1]);

    el.innerHTML = resetBtn + `<div class="drawer-section">
      <h4>👤 依作者篩選</h4>
      <div class="filter-item${!activeFilters.author?' on':''}" onclick="filterDrawerAuthor(null)">
        <div class="fi-left"><span class="fi-emoji">👥</span><span class="fi-label">所有作者</span></div>
        <span class="fi-count">${CARDS.length}</span>
      </div>
      ${authors.map(([author,cnt])=>{
        const on = activeFilters.author===author;
        // short display: take up to first comma or 30 chars
        const shortName = author.length>32 ? author.slice(0,30)+'…' : author;
        return`<div class="filter-item${on?' on':''}" onclick="filterDrawerAuthor('${author.replace(/'/g,"\\'") }')">
          <div class="fi-left"><span class="fi-emoji">👤</span><span class="fi-label">${shortName}</span></div>
          <span class="fi-count">${cnt}</span>
        </div>`;
      }).join('')}
    </div>`;

  } else {
    // Likes tab: ranked list of all cards
    const sorted = [...CARDS].sort((a,b)=>getLikes(b.id)-getLikes(a.id));
    const medals = ['🥇','🥈','🥉'];
    const likedCards = sorted.filter(c=>getLikes(c.id)>0);
    const unlikedCards = sorted.filter(c=>getLikes(c.id)===0);

    el.innerHTML = `<div class="drawer-section">
      <h4>❤️ 收藏排行</h4>
      ${likedCards.length===0
        ? `<div class="drawer-empty"><div class="de-icon">🤍</div>還沒有收藏的卡片<br><small>點卡片上的 🤍 來收藏</small></div>`
        : likedCards.map((c,i)=>{
          const ct=cardText(c); const lc=getLikes(c.id);
          const m = DOMAIN_META[c.domain]||{emoji:'📌'};
          return`<div class="likes-card" onclick="openModal('${c.id}');toggleDrawer()">
            <span class="likes-rank">${medals[i]||'#'+(i+1)}</span>
            <div class="likes-info">
              <div class="likes-title">${ct.title}</div>
              <div class="likes-meta">${m.emoji} ${c.day}</div>
            </div>
            <span class="likes-heart">❤️ ${lc}</span>
          </div>`;
        }).join('')
      }
      ${unlikedCards.length>0 && likedCards.length>0 ? `
      <div style="border-top:1px solid var(--bd);margin:10px 0 8px;padding-top:10px">
        <div style="font-size:10px;color:var(--tx3);font-weight:700;letter-spacing:1px;padding:0 2px 6px">其他卡片</div>
        ${unlikedCards.map(c=>{
          const ct=cardText(c);
          const m = DOMAIN_META[c.domain]||{emoji:'📌'};
          return`<div class="likes-card" onclick="openModal('${c.id}');toggleDrawer()">
            <span class="likes-rank" style="opacity:.4">—</span>
            <div class="likes-info">
              <div class="likes-title" style="opacity:.7">${ct.title}</div>
              <div class="likes-meta">${m.emoji} ${c.day}</div>
            </div>
            <span class="likes-heart" style="opacity:.4">🤍</span>
          </div>`;
        }).join('')}
      </div>` : ''}
    </div>`;
  }
}

// Filter action handlers
function filterDrawerCat(cat){
  activeFilters.cat = cat;
  applyActiveFilters();
  // also update catbar highlight
  document.querySelectorAll('.cbtn').forEach(b=>{
    b.classList.toggle('on', cat ? b.dataset.cat===cat : b.dataset.cat==='all');
  });
  renderDrawer();
}
function filterDrawerDay(day){
  activeFilters.day = day;
  if(day){ curDay=day; updateDateDisplay(); }
  applyActiveFilters();
  // update daynav chips
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.day===day));
  renderDrawer();
}
function filterDrawerAuthor(author){
  activeFilters.author = author;
  applyActiveFilters();
  renderDrawer();
}

function selectDay(day){ curDay=day; filterByDay(day); updateDateDisplay(); renderDrawer(); }
function filterByDay(day){
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('hide',c.dataset.day!==day));
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('on',c.dataset.day===day));
}
function filterCat(cat){
  document.querySelectorAll('.card').forEach(c=>c.classList.toggle('hide',cat!=='all'&&c.dataset.domain!==cat));
  toggleDrawer();
}

// ════════════════════════════════
// EXPORT CSV
// ════════════════════════════════
function exportCSV(){
  const t=T[curLang];
  const rows=[['日期/Date','種類/Domain','標題/Title','作者/Author','參考資料/Reference','連結/URL','喜好數/Likes']];
  CARDS.forEach(c=>{
    const ct=cardText(c);
    rows.push([c.day,c.domain,ct.title,c.author,c.ref,c.url,getLikes(c.id)]);
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='daily-knowledge-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

// ════════════════════════════════
// LANG
// ════════════════════════════════
function applyLang(){
  const t=T[curLang];
  document.documentElement.lang=curLang;
  document.getElementById('logo-main').textContent=t.logoMain;
  document.getElementById('logo-sub').textContent=t.logoSub;
  document.getElementById('hl').textContent=t.hl;
  document.getElementById('sub').textContent=t.sub;
  document.getElementById('vday').textContent=t.vday;
  document.getElementById('vcat').textContent=t.vcat;
  document.getElementById('ft-title').textContent=t.ftTitle;
  document.getElementById('ft-sub').textContent=t.ftSub;
  document.getElementById('sp-title').textContent=t.hl;
  document.getElementById('sp-sub').textContent=t.sub;
  updateDateDisplay(); // 動態格式化日期，取代硬編碼的 t.ds
  document.getElementById('sp-hint').textContent=t.spHint;
  document.getElementById('dt-label').textContent=t.dtDate;
  document.querySelectorAll('[data-key]').forEach(el=>{
    const k=el.dataset.key; if(t[k]) el.textContent=t[k];
  });
  document.querySelectorAll('.lpill').forEach(p=>p.classList.toggle('on',p.dataset.l===curLang));
  renderCards();
  renderDrawer();
}

// ════════════════════════════════
// INIT & EVENTS
// ════════════════════════════════
// Splash: hide after animation + on click
document.getElementById('splash').addEventListener('click',()=>{
  document.getElementById('splash').classList.add('gone');
});
setTimeout(()=>document.getElementById('splash').classList.add('gone'), 3550);

// Dark mode
document.getElementById('darkbtn').addEventListener('click',function(){
  isDark=!isDark;
  document.documentElement.setAttribute('data-theme',isDark?'dark':'light');
  this.textContent=isDark?'☀️':'🌙';
});

// View switch
document.getElementById('vday').addEventListener('click',function(){
  document.getElementById('vday').classList.add('on');
  document.getElementById('vcat').classList.remove('on');
  document.getElementById('daynav').style.display='flex';
  document.getElementById('catbar').classList.remove('show');
  filterByDay(curDay);
  const sq=document.getElementById('searchbox'); if(sq&&sq.value) doSearch(sq.value);
});
document.getElementById('vcat').addEventListener('click',function(){
  document.getElementById('vcat').classList.add('on');
  document.getElementById('vday').classList.remove('on');
  document.getElementById('daynav').style.display='none';
  document.getElementById('catbar').classList.add('show');
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('hide'));
});


// Lang
document.querySelectorAll('.lpill').forEach(p=>p.addEventListener('click',function(){
  curLang=this.dataset.l; applyLang();
}));

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closePanel();if(drawerOpen)toggleDrawer()}});



// Search
function doSearch(q){
  q = q.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('show', q.length > 0);
  const t = T[curLang];
  let count = 0;
  document.querySelectorAll('.card').forEach(card => {
    const id = card.dataset.id;
    const c = CARDS.find(x=>x.id===id);
    const ct = cardText(c);
    const text = [ct?.title||'', ct?.tag||'', ct?.plain||'', ct?.tech||'', c?.author||''].join(' ').toLowerCase();
    const match = !q || text.includes(q);
    const dayMatch = !activeFilters.day || c?.day === activeFilters.day;
    const catMatch = !activeFilters.cat || c?.domain === activeFilters.cat;
    card.classList.toggle('hide', !match || !dayMatch || !catMatch);
    if(match && dayMatch && catMatch) count++;
  });
  document.getElementById('search-count').textContent = q ? count + ' 筆' : '';
}
function clearSearch(){
  document.getElementById('searchbox').value='';
  doSearch('');
}

// Font size control
const fzBtns = document.querySelectorAll('.fz-btn');
const savedFz = parseFloat(localStorage.getItem('fz') || '1');
function applyFz(v){
  document.documentElement.style.setProperty('--fz', v);
  localStorage.setItem('fz', v);
  fzBtns.forEach(b => b.classList.toggle('active', parseFloat(b.dataset.fz) === v));
}
fzBtns.forEach(b => b.addEventListener('click', () => applyFz(parseFloat(b.dataset.fz))));
applyFz(savedFz);

// Init — load ALL available JSON data then render
loadAllData().then(result=>{
  if(result && result.cards && result.cards.length){
    CARDS = result.cards;
    curDay = result.latestDate;
    // 初始化月曆到最新資料月份
    if(result.latestDate){
      const d = new Date(result.latestDate+'T00:00:00');
      calYear = d.getFullYear(); calMonth = d.getMonth();
      calInitialized = true;
    }
  }
  renderDayChips();
  renderCatbar();
  applyLang();       // → renderCards() + renderDrawer()
  renderQuickDays(); // 快速日期按鈕

  // 預設顯示最新日期的卡片，並鎖定 activeFilters
  if(curDay){
    activeFilters.day = curDay;
    filterByDay(curDay);
  }

  // Update sidebar date hint
  const hint=document.getElementById('sidebar-date-hint');
  if(hint && AVAILABLE_DATES.length){
    hint.textContent=`${AVAILABLE_DATES.length} 天 · ${CARDS.length} 篇`;
  }
});
